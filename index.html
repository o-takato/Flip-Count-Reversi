<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flip Count Reversi</title>
    <!-- Tailwind CSS (レイアウト補助用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-col items-center min-h-screen p-4">

    <!-- ヘッダー -->
    <div class="w-full max-w-md flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-black text-slate-900 uppercase tracking-tighter">Flip Count</h1>
            <p id="game-mode-label" class="text-[10px] font-bold text-slate-400 tracking-widest uppercase">PVP MODE</p>
        </div>
    </div>

    <!-- スコアボード -->
    <div class="flex gap-4 w-full max-w-md mb-6">
        <div id="black-card" class="flex-1 bg-white p-4 rounded-2xl shadow-sm text-center transition-all">
            <div class="text-[10px] text-slate-400 font-bold uppercase mb-1">BLACK</div>
            <div id="black-score" class="text-3xl font-black">0</div>
        </div>
        <div id="white-card" class="flex-1 bg-white p-4 rounded-2xl shadow-sm text-center transition-all">
            <div class="text-[10px] text-slate-400 font-bold uppercase mb-1">WHITE</div>
            <div id="white-score" class="text-3xl font-black">0</div>
        </div>
    </div>

    <!-- 盤面 -->
    <div id="board" class="board-container mb-6"></div>
    <div id="status-msg" class="text-sm font-bold text-slate-600 bg-white px-8 py-3 rounded-full shadow-sm">Loading...</div>

    <!-- スタートメニュー -->
    <div id="start-menu" class="modal-overlay fixed inset-0 z-50 flex items-center justify-center p-6">
        <div class="bg-white rounded-[2rem] w-full max-w-sm p-10 shadow-2xl text-center">
            <h2 class="text-3xl font-black mb-6">Flip Count</h2>
            <div class="space-y-4">
                <button id="btn-cpu" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-bold">一人で遊ぶ (CPU戦)</button>
                <button id="btn-pvp" class="w-full py-5 border-2 border-slate-200 rounded-2xl font-bold">二人で遊ぶ (対人戦)</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
